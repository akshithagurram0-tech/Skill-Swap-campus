<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap Campus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎓SkillSwap Campus</h1>
        <p>Connect students through skill exchange.</p>
        <div class="form">
            <input type="text" id="name" placeholder="Student Name">
            <input type="text" id="haveSkills"
                placeholder="Skills You Have (Python, HTML, Canva)">
            <input type="text" id="wantSkills"
                placeholder="Skills You Want to Learn (UI/UX, Java)">
            <button onclick="addStudent()">Add Student</button>
        </div>
        <div class="section">
            <h2>Students</h2>
            <div id="studentList"></div>
        </div>
        <div class="section">
            <h2>Skill Matches</h2>
            <div id="matches"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
